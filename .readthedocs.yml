# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details
version: 2
build:
  os: ubuntu-22.04
  tools:
    python: "3"  # latest 3.x CPython release
sphinx:
  configuration: sphinx/conf.py
formats: all
python:
  install:
    - requirements: sphinx/requirements.txt
    - method: pip
      path: .